<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NEXUS STORE EXECUTOR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://storage.googleapis.com/generativeai-static/image_generation_content/0/image.png">
    
    <style>
        :root { --neon-purple: #bc13fe; --dark: #050505; --gray: #121212; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--dark); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-card { width: 92%; max-width: 400px; background: var(--gray); border: 1px solid #333; border-radius: 30px; padding: 40px 25px; text-align: center; box-shadow: 0 0 40px rgba(188, 19, 254, 0.15); }
        
        /* Estilo da Logo que você mandou */
        .logo { width: 120px; height: 120px; border-radius: 25px; margin-bottom: 20px; border: 2px solid var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); object-fit: cover; }
        
        h1 { margin: 10px 0; font-size: 26px; color: #fff; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        .status { font-size: 10px; color: var(--neon-purple); margin-bottom: 35px; letter-spacing: 4px; font-weight: bold; text-shadow: 0 0 5px var(--neon-purple); }
        
        .btn { display: block; background: var(--neon-purple); color: white; padding: 18px; margin: 15px 0; border-radius: 16px; text-decoration: none; font-weight: 800; font-size: 15px; transition: 0.3s; box-shadow: 0 5px 20px rgba(188, 19, 254, 0.4); text-transform: uppercase; }
        .btn:active { transform: scale(0.94); opacity: 0.8; }
        .btn-sec { background: transparent; color: #fff; border: 1px solid #444; box-shadow: none; }
        
        #ios-banner { display: none; position: fixed; bottom: 25px; left: 5%; width: 90%; background: rgba(255, 255, 255, 0.95); color: #000; padding: 20px; border-radius: 20px; font-size: 13px; font-weight: 700; text-align: center; z-index: 999; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="app-card">
        <img src="https://storage.googleapis.com/generativeai-static/image_generation_content/0/image.png" class="logo" alt="Nexus Logo">
        
        <h1>NEXUS STORE</h1>
        <div class="status">● ETERNAL V29 ONLINE</div>

        <a href="https://www.mediafire.com/file/t24fnb5m4g36ym9/NEXUX_STORE_ETERNAL_V29_AUTO_SCAN.lua.txt/file" class="btn">INJETAR SCRIPT V29</a>
        <a href="https://gameguardian.net/forum/files/file/2-gameguardian/" class="btn btn-sec">INSTALAR EXECUTOR ROOT</a>
        
        <p style="font-size: 9px; color: #333; margin-top: 40px; letter-spacing: 1px;">NEXUS ENCRYPTION SYSTEM © 2026</p>
    </div>

    <div id="ios-banner">
        📥 <b>INSTALAÇÃO:</b> Toque em <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/IOS_Share_Icon.svg/1200px-IOS_Share_Icon.svg.png" style="width:16px; vertical-align: middle;"> e selecione <b>"Adicionar à Tela de Início"</b>.
    </div>

    <script>
        // Lógica para mostrar o aviso de instalação no iPhone
        if (navigator.standalone === false || (window.matchMedia('(display-mode: standalone)').matches === false)) {
            if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                document.getElementById('ios-banner').style.display = 'block';
            }
        }
    </script>
</body>
</html>
